name: Feature Pipeline (Hourly)

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  fetch-features:
    name: Fetch & Store Live AQI Features
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy pyarrow requests python-dotenv \
                      "feast[redis]>=0.40.0" redis

      - name: Create required directories
        run: mkdir -p data/raw data/feast

      - name: Restore live Parquet cache
        uses: actions/cache@v4
        with:
          path: data/raw/aqi_features_live.parquet
          key: live-parquet-v2-${{ github.run_number }}
          restore-keys: |
            live-parquet-v2-

      - name: Apply Feast feature definitions
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
        run: feast -c feature_store apply

      - name: Run feature pipeline
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          CITY_NAME: "Karachi"
          CITY_LAT: "24.8607"
          CITY_LON: "67.0011"
        run: python -m src.feature_pipeline

      - name: Show feature count
        run: |
          python -c "
          import pandas as pd
          df = pd.read_parquet('data/raw/aqi_features_live.parquet')
          print(f'Live Parquet rows: {len(df)}')
          print(f'Latest: {df.timestamp.max()}')
          "

      - name: Log completion
        run: echo "✅ Feature pipeline done at $(date -u)"

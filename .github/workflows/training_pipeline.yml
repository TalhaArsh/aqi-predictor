# ============================================================
# Training Pipeline — runs daily at 02:00 UTC
# 1. Pulls historical + live data from DagsHub (DVC)
# 2. Merges live into historical
# 3. Retrains Ridge + RF + CatBoost
# 4. Registers best model per horizon to Production in MLflow
# 5. Pushes updated data back to DagsHub (DVC)
#
# Models train on GitHub Actions (Ubuntu cloud runner).
# Trained models stored in DagsHub MLflow registry.
# Dashboard loads models from registry at startup.
# ============================================================

name: Training Pipeline (Daily)

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily (07:00 Karachi PKT)
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  retrain:
    name: Retrain Models & Register Best
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      SKIP_SHAP: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy pyarrow requests python-dotenv
          pip install scikit-learn shap catboost
          pip install "dvc[http]>=3.0.0" dagshub mlflow
          pip install joblib matplotlib seaborn

      - name: Create required directories
        run: mkdir -p data/raw data/interim data/feast models

      - name: Initialize DVC
        run: |
          dvc init --no-scm 2>/dev/null || true
          dvc remote add -d dagshub https://dagshub.com/TalhaArsh/aqi-predictor.dvc || true
          dvc remote modify dagshub auth basic
          dvc remote modify dagshub user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify dagshub password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull historical data from DagsHub (DVC)
        run: |
          dvc pull data/raw/aqi_features_historical.parquet || \
            echo "No historical data in DVC yet"

      - name: Restore live Parquet from cache
        uses: actions/cache@v4
        with:
          path: data/raw/aqi_features_live.parquet
          key: live-parquet-v2-${{ github.run_number }}
          restore-keys: |
            live-parquet-v2-

      - name: Check live data
        run: |
          if [ -f "data/raw/aqi_features_live.parquet" ]; then
            python -c "import pandas as pd; df=pd.read_parquet('data/raw/aqi_features_live.parquet'); print(f'Live Parquet: {len(df)} rows, latest: {df.timestamp.max()}')"
          else
            echo "No live data found — training on historical only"
          fi

      - name: Merge live data into historical
        run: |
          python - << 'PYEOF'
          import pandas as pd
          from pathlib import Path

          hist_path = Path("data/raw/aqi_features_historical.parquet")
          live_path = Path("data/raw/aqi_features_live.parquet")

          if not hist_path.exists():
              print("No historical data found — skipping merge")
              exit(0)

          df_hist = pd.read_parquet(hist_path)
          print(f"Historical: {len(df_hist):,} rows")

          if live_path.exists():
              df_live = pd.read_parquet(live_path)
              # Normalize timestamps
              for df in [df_hist, df_live]:
                  df["timestamp"] = pd.to_datetime(df["timestamp"])
                  if df["timestamp"].dt.tz is not None:
                      df["timestamp"] = df["timestamp"].dt.tz_localize(None)
              df_all = pd.concat([df_hist, df_live], ignore_index=True)
              df_all = df_all.drop_duplicates(subset="timestamp")
              df_all = df_all.sort_values("timestamp").reset_index(drop=True)
              df_all.to_parquet(hist_path, index=False)
              print(f"Merged: {len(df_all):,} rows saved to {hist_path}")
          else:
              print("No live data to merge")
          PYEOF

      - name: Run feature imputation pipeline
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: python src/impute_features.py

      - name: Train Ridge regression
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          SKIP_SHAP: "true"
        run: python -m src.training.train_ridge

      - name: Train Random Forest
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          SKIP_SHAP: "true"
        run: python -m src.training.train_rf

      - name: Train CatBoost
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          SKIP_SHAP: "true"
        run: python -m src.training.train_catboost

      - name: Register best models to Production
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python -m src.training.register_best

      - name: Push updated data to DagsHub (DVC)
        run: |
          dvc add data/raw/aqi_features_historical.parquet || true
          dvc add data/interim/aqi_features_cleaned.parquet || true
          dvc push || echo "DVC push failed — continuing"

      - name: Log completion
        run: |
          echo "✅ Training pipeline completed at $(date -u)"
          echo "   Models: https://dagshub.com/TalhaArsh/aqi-predictor/experiments"
